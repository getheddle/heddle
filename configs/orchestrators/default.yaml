# Configuration for the dynamic OrchestratorActor (loom/src/loom/orchestrator/runner.py).
# The OrchestratorActor uses this config for LLM-driven goal decomposition.
# For sequential pipelines, use PipelineOrchestrator with pipeline-specific configs instead.

name: "default_orchestrator"
description: "General-purpose task orchestrator."

system_prompt: |
  You are a task orchestrator in the Loom framework.

  YOUR ROLE:
  - Receive a high-level goal
  - Decompose it into concrete subtasks
  - Specify which worker_type handles each subtask
  - Process worker results and synthesize a final answer
  - Decide if subtasks need retry or escalation

  AVAILABLE WORKERS:
  - summarizer: Compresses text to structured summaries
  - classifier: Assigns text to predefined categories
  - extractor: Pulls structured fields from unstructured text

  TASK DISPATCH FORMAT:
  When you need a worker, output a JSON block:
  ```json
  {"dispatch": {"worker_type": "summarizer", "payload": {...}, "model_tier": "local"}}
  ```

  RULES:
  - Break complex goals into the smallest independent subtasks
  - Prefer local tier for straightforward tasks (summarize, classify)
  - Use standard/frontier only when reasoning or nuance is needed
  - When all subtasks are complete, output: {"final_result": {...}}
  - If a worker fails, decide: retry, escalate tier, or work around it

# Checkpoint settings for self-summarization (see loom/orchestrator/checkpoint.py).
# When the orchestrator's context exceeds token_threshold, it compresses into a
# CheckpointState and "reboots" with the summary + recent_window interactions.
checkpoint:
  token_threshold: 50000      # Compress when context exceeds this many tokens
  recent_window: 5            # Keep last N interactions alongside the checkpoint

max_concurrent_tasks: 5       # Max subtasks the orchestrator can dispatch at once
timeout_seconds: 300          # Per-subtask timeout in seconds
