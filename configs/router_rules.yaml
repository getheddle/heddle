# Task routing rules — read by TaskRouter (loom/src/loom/router/router.py).
# These are deterministic — no LLM involved.
#
# The router subscribes to loom.tasks.incoming and republishes each task
# to loom.tasks.{worker_type}.{tier}, where tier is resolved here.

# Override the default model tier for specific worker types.
# If a worker_type is not listed here, the tier from the TaskMessage is used.
# This lets you force all tasks of a given type to a specific tier,
# regardless of what the producer requested.
tier_overrides:
  summarizer: "local"
  classifier: "local"
  extractor: "standard"
  # analyzer: "frontier"

# Per-tier rate limits enforced by the router's token-bucket rate limiter.
# max_concurrent: bucket capacity (burst limit). Tasks exceeding this are
#                 sent to loom.tasks.dead_letter with reason "rate_limited".
# tokens_per_minute: used to derive the refill rate. The bucket refills one
#                    token every (60 / max_concurrent) seconds.
# NOTE: This is dispatch-side throttling only. It does not track whether
#       workers have finished processing. For true backpressure, workers
#       would need to report completion events.
rate_limits:
  local:
    max_concurrent: 4
    tokens_per_minute: 100000
  standard:
    max_concurrent: 10
    tokens_per_minute: 200000
  frontier:
    max_concurrent: 3
    tokens_per_minute: 50000
