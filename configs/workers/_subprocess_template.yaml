# ──────────────────────────────────────────────────────────────────────
# Subprocess Worker Template
# ──────────────────────────────────────────────────────────────────────
#
# Wrap any CLI tool as a Heddle worker.  Four io_mode values cover
# the common patterns — pick the one that matches your tool.
#
# io_mode: json_stdio    — JSON in via stdin, JSON out from stdout
#                          THE polyglot path: Node, Go, Rust, Python scripts
# io_mode: stdin_stdout  — pipe one field to stdin, capture stdout
# io_mode: args_stdout   — payload fields become CLI args, capture stdout
# io_mode: file_file     — write temp file, run tool, read output file
#
# All subprocess calls use shell=False.  No shell interpretation.
# ──────────────────────────────────────────────────────────────────────

# ── Example 1: json_stdio (recommended for polyglot workers) ────────
#
# The script reads JSON from stdin and writes JSON to stdout.
# This is the simplest way to make a Node/Go/Rust/Python script
# participate in the Heddle actor mesh without knowing about NATS.

name: "my_json_worker"
description: "Process input via a JSON stdin/stdout script"

worker_kind: "processor"
processing_backend: "heddle.contrib.subprocess.SubprocessBackend"

backend_config:
  command: ["node", "scripts/my_worker.js"]
  io_mode: "json_stdio"
  subprocess_timeout: 15

  # Which payload fields to send (default: "all")
  input_mapping:
    fields: "all"
    # OR send only specific fields:
    # fields: ["text", "target_language"]

  # How to interpret stdout JSON (default: root = direct merge)
  output_mapping:
    target: "root"
    # OR nest under a key:
    # target: "result"
    # OR extract a specific key from the JSON response:
    # extract_key: "data"

  # Optional: label for TaskResult.model_used (default: command[0])
  model_used: "my-worker-v1"

input_schema:
  type: object
  required: [text]
  properties:
    text:
      type: string
      description: "Input text to process"

output_schema:
  type: object
  required: [result]
  properties:
    result:
      type: string

default_model_tier: "local"
reset_after_task: true
timeout_seconds: 30


