# =============================================================================
# RAG Trend Analyzer Worker Configuration (LLM)
# =============================================================================
#
# Detects recurring narrative topics and trends across multi-channel Telegram
# post windows. Unlike the other RAG workers, this is an LLM worker — it sends
# formatted post batches to an LLM for analysis and receives structured JSON.
#
# Component:  LLM worker (worker_kind: "llm")
# Source:     src/heddle/worker/runner.py (LLMWorker)
# Analysis:   src/heddle/contrib/rag/analysis/llm_analyzers.py (TrendAnalyzer)
# Loaded by:  heddle.core.config.load_config()
# Validated:  heddle.core.contracts.py (I/O schema enforcement)
#
# Run with:
#   heddle worker --config configs/workers/rag_trend_analyzer.yaml --tier local
#   heddle worker --config configs/workers/rag_trend_analyzer.yaml --tier standard
#
# NATS subject:  heddle.tasks.rag_trend_analyzer.{tier}
#
# This worker is designed for Persian (Farsi) content but works with any language.
# The system prompt instructs the LLM to preserve Persian text and handle RTL.
#
# Related LLM analyzers (defined in llm_analyzers.py, each needs its own config):
#   - TrendAnalyzer       — this worker; detects recurring topics
#   - CorroborationFinder — finds cross-channel confirmation of claims
#   - AnomalyDetector     — flags unusual posts or patterns
#   - DataExtractor       — extracts structured data (names, dates, numbers)
#
# Tier selection:
#   "local"    — Ollama. Fast, free, good for development and testing.
#                May miss subtle trends or produce lower-quality analysis.
#   "standard" — Claude Sonnet. Recommended for production. Good balance
#                of quality and cost for trend analysis.
#   "frontier" — Claude Opus. Best for complex geopolitical analysis where
#                nuance and reasoning quality are critical.
#
# Related configs:
#   configs/orchestrators/rag_pipeline.yaml — can be added as a pipeline stage
#   configs/workers/rag_mux.yaml            — produces the muxed windows this analyzes
#   configs/workers/_template.yaml          — annotated template for new workers
# =============================================================================

# name (str, required)
name: "rag_trend_analyzer"

# description (str, optional)
description: "Detects narrative trends across multi-channel Telegram windows."

# worker_kind (str, optional — "llm" is the default)
# Explicitly set to "llm" to clarify this is an LLM worker, unlike the other
# RAG workers which are processors.
worker_kind: "llm"

# system_prompt (str, required for LLM workers)
# This prompt handles Persian/Arabic/mixed content. The LLM must return
# valid JSON matching the output_schema below. The prompt asks for 3-8 trends
# with topic labels, descriptions, channel presence, and severity ratings.
system_prompt: |
  You are an expert intelligence analyst processing Persian-language Telegram posts.
  Text may be in Persian (Farsi), Arabic, or mixed Persian/English.
  Persian is RTL (right-to-left). Preserve Persian text exactly as-is in your output.
  Always respond with valid JSON only — no prose, no markdown fences.

  Your task: identify the top narrative TRENDS in a batch of Telegram posts from
  multiple Persian news channels. A trend is a topic that appears in >=2 posts,
  even if framed differently.

  Return JSON with this exact structure:
  {
    "trends": [
      {
        "topic_label": "short English label",
        "topic_label_fa": "Persian label (optional)",
        "description": "2-3 sentence description in English",
        "channels_present": ["channel name 1", ...],
        "post_indices": [1, 3, 7],
        "keywords": ["keyword1", "keyword2", ...],
        "sentiment": "positive|negative|neutral|mixed",
        "severity": "low|medium|high|critical"
      }
    ]
  }
  Return 3-8 trends. Focus on political, economic, social, and security topics.

# input_schema (dict, required)
# posts: pre-formatted text containing multiple posts for analysis.
#   Typically produced by formatting MuxedStream window entries.
# window_id: optional identifier for the time window being analyzed.
# entry_count: optional count of posts in the window (for logging/tracking).
input_schema:
  type: object
  required: [posts]
  properties:
    posts:
      type: string
      description: "Formatted post text for analysis."
    window_id:
      type: string
    entry_count:
      type: integer

# output_schema (dict, required)
# trends: array of trend objects. Each trend has topic_label, description,
# and optionally severity, sentiment, channels_present, post_indices, keywords.
output_schema:
  type: object
  required: [trends]
  properties:
    trends:
      type: array
      items:
        type: object
        required: [topic_label, description]
        properties:
          topic_label:
            type: string
          description:
            type: string
          severity:
            type: string

# default_model_tier (str, required)
# "local" for development; upgrade to "standard" for production analysis.
# Valid: "local" | "standard" | "frontier"
default_model_tier: "local"

# max_input_tokens (int, optional)
# 8000 tokens accommodates ~20-30 Telegram posts in a single window.
# For larger windows, increase or batch the analysis.
max_input_tokens: 8000

# max_output_tokens (int, optional)
# 4000 tokens allows 3-8 detailed trend objects with descriptions and metadata.
# Trend analysis output is typically 1500-3000 tokens.
max_output_tokens: 4000

# reset_after_task (bool, required — MUST be true)
reset_after_task: true

# timeout_seconds (int, optional, default: 60)
# 120s for trend analysis. LLM needs time to read posts, identify patterns,
# and produce structured JSON. Local models may need the full window.
timeout_seconds: 120
