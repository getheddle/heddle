# =============================================================================
# Extractor Worker Configuration
# =============================================================================
#
# Pulls structured fields from unstructured text. Fields are defined at call
# time with name, description, expected type, and required flag — making this
# a generic extraction worker usable for any document schema.
#
# Component:  LLM worker (worker_kind: "llm", the default)
# Source:     src/loom/worker/runner.py (LLMWorker)
# Loaded by:  loom.core.config.load_config()
# Validated:  loom.core.contracts.py (I/O schema enforcement)
#
# Run with:
#   loom worker --config configs/workers/extractor.yaml --tier standard
#   loom worker --config configs/workers/extractor.yaml --tier standard --nats-url nats://localhost:4222
#
# NATS subject:  loom.tasks.extractor.standard  (tier forced by router_rules.yaml)
# Queue group:   Workers auto-join queue groups, so multiple replicas load-balance.
#
# Requires: ANTHROPIC_API_KEY environment variable (standard tier uses Claude Sonnet)
#
# Router override: tier_overrides in configs/router_rules.yaml forces this to "standard"
#
# Supported field types:
#   "string"  — Free-text extraction (names, titles, addresses)
#   "number"  — Numeric values (amounts, counts, percentages)
#   "date"    — Date values (ISO 8601 preferred, but LLM normalizes)
#   "list"    — Array of values (e.g., list of names, tags)
#   "boolean" — True/false determination (e.g., "is_signed", "has_attachment")
#
# Extraction tips:
#   - Write clear field descriptions — the LLM uses these to locate data.
#   - Mark fields as required:true only when absence should be flagged as an error.
#   - For ambiguous fields, the LLM picks the most likely value and quotes context.
#   - source_quote is capped at 15 words to keep output concise.
#
# Related configs:
#   configs/router_rules.yaml          — tier override & rate limits
#   configs/orchestrators/default.yaml — lists this as an available_worker
#   configs/mcp/docman.yaml            — exposes this worker as an MCP tool
#   configs/workers/_template.yaml     — annotated template for new workers
# =============================================================================

# name (str, required)
# Must match the worker_type in TaskMessage routing.
name: "extractor"

# description (str, optional)
# Shown in Workshop UI and MCP tool discovery.
description: "Extracts structured fields from unstructured text."

# system_prompt (str, required for LLM workers)
# Fields to extract are specified in the task payload, not here.
# This keeps the worker generic across document types.
system_prompt: |
  You are a field extractor. You pull specific data from unstructured text.

  INPUT FORMAT:
  - text (string): Source text
  - fields (list[object]): Fields to extract, each with:
    - name (string): Field identifier
    - description (string): What to look for
    - type (string): Expected type — "string", "number", "date", "list", "boolean"
    - required (bool): Whether absence is an error

  OUTPUT FORMAT:
  {
    "extracted": {
      "field_name": {"value": <extracted>, "source_quote": "brief excerpt where found"},
      ...
    },
    "missing_required": ["field_name", ...]
  }

  RULES:
  - source_quote must be under 15 words, just enough to verify
  - For missing optional fields, omit them entirely
  - For ambiguous values, pick the most likely and note in source_quote

# input_schema (dict, required)
# Each field object must have name, description, and type. The "required"
# flag within field objects is optional (defaults to false).
input_schema:
  type: object
  required: [text, fields]
  properties:
    text:
      type: string
    fields:
      type: array
      items:
        type: object
        required: [name, description, type]

# output_schema (dict, required)
# extracted is a dict of field_name -> {value, source_quote}.
# missing_required lists field names that were required but not found.
output_schema:
  type: object
  required: [extracted, missing_required]
  properties:
    extracted:
      type: object
    missing_required:
      type: array

# default_model_tier (str, required)
# Extraction benefits from stronger reasoning — "standard" (Claude Sonnet) is
# recommended. "local" works for simple fields but struggles with ambiguity.
# "frontier" is overkill unless extracting from complex legal/financial docs.
# Valid: "local" | "standard" | "frontier"
default_model_tier: "standard"

# max_input_tokens (int, optional)
# 8000 tokens ~ 6000 words. Sufficient for most documents. For very long
# documents, pre-split into sections and extract from each.
max_input_tokens: 8000

# max_output_tokens (int, optional)
# 2000 tokens allows extracting ~20 fields with source quotes.
# Increase if extracting many fields from a single document.
max_output_tokens: 2000

# reset_after_task (bool, required — MUST be true)
# Workers are stateless. No state carries between tasks.
reset_after_task: true

# timeout_seconds (int, optional, default: 60)
# Standard tier (Claude Sonnet) typically responds in 10-30s.
# 45s gives headroom for long documents.
timeout_seconds: 45
