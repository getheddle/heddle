# Deployment for the Heddle dynamic orchestrator.
#
# The orchestrator uses an LLM to decompose goals into subtasks, dispatches
# them to workers via the router, and synthesizes the results. It requires
# NATS for messaging and Valkey for checkpoint state.
#
# The container CMD (set in Dockerfile.orchestrator) runs:
#   heddle orchestrator --config configs/orchestrators/default.yaml --nats-url nats://nats:4222
#
# Note: OrchestratorActor is currently a stub. The container will start and
# subscribe to heddle.goals.incoming, but the decompose/dispatch/synthesize
# loop is not yet implemented.
#
# Build image: docker build -f Dockerfile.orchestrator -t heddle-orchestrator .
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: heddle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: heddle-orchestrator
  template:
    metadata:
      labels:
        app: heddle-orchestrator
    spec:
      containers:
        - name: orchestrator
          image: heddle-orchestrator:latest
          imagePullPolicy: Never    # For Minikube local builds
          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: heddle-secrets
                  key: anthropic-api-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
