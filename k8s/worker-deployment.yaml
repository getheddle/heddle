# Worker deployments — one per worker_type.
# Each subscribes to loom.tasks.{worker_type}.{tier} with a queue group,
# enabling horizontal scaling via NATS competing consumers.
#
# To add a new worker type:
#   1. Create a worker config YAML in configs/workers/
#   2. Add a Deployment block here following the pattern below
#   3. Set WORKER_CONFIG and MODEL_TIER appropriately
#   4. Add tier_overrides in configs/router_rules.yaml if needed
#
# NOTE: imagePullPolicy: Never is for Minikube (local image builds).
#       Change to IfNotPresent or Always for real clusters.
---
# Summarizer workers (local tier)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-summarizer
  namespace: loom
spec:
  replicas: 2        # Scale horizontally — competing consumers via NATS queue group
  selector:
    matchLabels:
      app: loom-worker
      worker-type: summarizer
  template:
    metadata:
      labels:
        app: loom-worker
        worker-type: summarizer
    spec:
      containers:
        - name: worker
          image: loom-worker:latest
          imagePullPolicy: Never
          env:
            - name: WORKER_CONFIG
              value: "configs/workers/summarizer.yaml"
            - name: MODEL_TIER
              value: "local"
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: loom-secrets
                  key: anthropic-api-key
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
# Classifier workers (local tier)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-classifier
  namespace: loom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loom-worker
      worker-type: classifier
  template:
    metadata:
      labels:
        app: loom-worker
        worker-type: classifier
    spec:
      containers:
        - name: worker
          image: loom-worker:latest
          imagePullPolicy: Never
          env:
            - name: WORKER_CONFIG
              value: "configs/workers/classifier.yaml"
            - name: MODEL_TIER
              value: "local"
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: loom-secrets
                  key: anthropic-api-key
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
# Extractor workers (standard tier)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-extractor
  namespace: loom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loom-worker
      worker-type: extractor
  template:
    metadata:
      labels:
        app: loom-worker
        worker-type: extractor
    spec:
      containers:
        - name: worker
          image: loom-worker:latest
          imagePullPolicy: Never
          env:
            - name: WORKER_CONFIG
              value: "configs/workers/extractor.yaml"
            - name: MODEL_TIER
              value: "standard"
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: loom-secrets
                  key: anthropic-api-key
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
