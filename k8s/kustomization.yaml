# Kustomize overlay for the Loom framework.
# Deploy: kubectl apply -k k8s/
#
# Prerequisites:
#   1. Create the loom-secrets secret with your Anthropic API key:
#      kubectl -n loom create secret generic loom-secrets \
#        --from-literal=anthropic-api-key=sk-ant-...
#   2. If using local models, deploy Ollama separately (see ollama-deployment.yaml)
#   3. Images use imagePullPolicy: Never (for Minikube local builds)
#
# Build all images before deploying:
#   docker build -f Dockerfile.router       -t loom-router .
#   docker build -f Dockerfile.orchestrator -t loom-orchestrator .
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: loom

resources:
  - namespace.yaml
  - nats-deployment.yaml
  - redis-deployment.yaml
  - router-deployment.yaml
  - worker-deployment.yaml
  - orchestrator-deployment.yaml
  # - ollama-deployment.yaml     # Uncomment if running local models in-cluster

commonLabels:
  app.kubernetes.io/part-of: loom
  app.kubernetes.io/managed-by: kustomize
