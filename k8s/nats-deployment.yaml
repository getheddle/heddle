apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: heddle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitoring
          args: ["-m", "8222"]     # Enable monitoring endpoint
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: heddle
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      name: client
    - port: 8222
      name: monitoring
