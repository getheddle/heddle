<text x="310" y="536" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#d4a820" text-anchor="start" dominant-baseline="central">loom.tasks.{worker_type}.{tier}</text>
<rect x="620" y="510" width="340" height="30" rx="4" fill="#f4f0ff" stroke="#d4c8ee" stroke-width="1"/>
