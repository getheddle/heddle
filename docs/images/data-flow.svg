        <rect width="1100" height="1150" rx="12" fill="#fafafb"/>
<text x="40" y="38" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#1e1e26" text-anchor="start" dominant-baseline="central">Loom — Data Flow</text>
<text x="40" y="62" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#888" text-anchor="start" dominant-baseline="central">Goal lifecycle:  submit  >  decompose  >  route  >  process  >  collect  >  return</text>
<circle cx="56" cy="116" r="16" fill="#e85c5c"/>
<text x="56" y="116" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
<text x="80" y="110" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e85c5c" text-anchor="start" dominant-baseline="hanging">SUBMIT GOAL</text>
<text x="80" y="130" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#888" text-anchor="start" dominant-baseline="hanging">Client sends a Goal via MCP, CLI, or API</text>
<line x1="56" y1="155" x2="56" y2="265" stroke="#ccc" stroke-width="2" marker-end="url(#arrow_1)"/>
<circle cx="56" cy="286" r="16" fill="#cc7333"/>
<text x="56" y="286" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
<text x="80" y="280" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#cc7333" text-anchor="start" dominant-baseline="hanging">DECOMPOSE</text>
<text x="80" y="300" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#888" text-anchor="start" dominant-baseline="hanging">GoalDecomposer breaks goal into tasks</text>
<line x1="56" y1="325" x2="56" y2="445" stroke="#ccc" stroke-width="2" marker-end="url(#arrow_2)"/>
<circle cx="56" cy="466" r="16" fill="#7d52c2"/>
<text x="56" y="466" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
<text x="80" y="460" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#7d52c2" text-anchor="start" dominant-baseline="hanging">ROUTE</text>
<text x="80" y="480" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#888" text-anchor="start" dominant-baseline="hanging">Router dispatches tasks via NATS subjects</text>
<line x1="56" y1="505" x2="56" y2="625" stroke="#ccc" stroke-width="2" marker-end="url(#arrow_3)"/>
<circle cx="56" cy="646" r="16" fill="#2e9e57"/>
<text x="56" y="646" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
<text x="80" y="640" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#2e9e57" text-anchor="start" dominant-baseline="hanging">PROCESS</text>
<text x="80" y="660" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#888" text-anchor="start" dominant-baseline="hanging">WorkerActor validates, calls backend, validates output</text>
<line x1="56" y1="685" x2="56" y2="805" stroke="#ccc" stroke-width="2" marker-end="url(#arrow_4)"/>
<circle cx="56" cy="826" r="16" fill="#4278d9"/>
<text x="56" y="826" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
<text x="80" y="820" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#4278d9" text-anchor="start" dominant-baseline="hanging">COLLECT</text>
<text x="80" y="840" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#888" text-anchor="start" dominant-baseline="hanging">ResultStream gathers results (early-exit, callbacks)</text>
<line x1="56" y1="865" x2="56" y2="975" stroke="#ccc" stroke-width="2" marker-end="url(#arrow_5)"/>
<circle cx="56" cy="996" r="16" fill="#278e94"/>
<text x="56" y="996" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text>
<text x="80" y="990" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#278e94" text-anchor="start" dominant-baseline="hanging">RETURN</text>
<text x="80" y="1010" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#888" text-anchor="start" dominant-baseline="hanging">Aggregated results via MCP / CLI / async iterator</text>
