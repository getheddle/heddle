<text x="910.0" y="710.0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle" dominant-baseline="central">LLM Backend Call</text>
<text x="810" y="748" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="400" fill="#999" text-anchor="start" dominant-baseline="central">input_schema -> LLM -> output_schema</text>
